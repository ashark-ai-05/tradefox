<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradeFox</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0a;--panel:#1a1a1a;--border:#2a2a2a;
  --text:#e0e0e0;--dim:#888;
  --green:#00c853;--red:#ff1744;--accent:#2196f3;
}
body{background:var(--bg);color:var(--text);font-family:'SF Mono','Consolas','Monaco',monospace;font-size:13px;overflow:hidden;height:100vh}
a{color:var(--accent);text-decoration:none}

.app{display:grid;grid-template-rows:40px 36px 1fr 32px;height:100vh}
.top-bar{display:flex;align-items:center;gap:12px;padding:0 16px;background:var(--panel);border-bottom:1px solid var(--border)}
.tab-bar{display:flex;align-items:center;gap:0;background:var(--panel);border-bottom:1px solid var(--border);padding:0 16px}
.tab-btn{background:transparent;color:var(--dim);border:none;border-bottom:2px solid transparent;padding:8px 16px;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;letter-spacing:0.5px;transition:all .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.main{display:grid;grid-template-columns:1fr 320px;overflow:hidden}
.main.backtest-mode{grid-template-columns:1fr}
.bottom-bar{display:flex;align-items:center;gap:24px;padding:0 16px;background:var(--panel);border-top:1px solid var(--border);font-size:12px}

.logo{font-weight:700;color:var(--green);font-size:14px;letter-spacing:1px}
.symbol-select{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:4px 8px;border-radius:4px;font-family:inherit;font-size:12px}
.tf-buttons{display:flex;gap:2px}
.tf-btn{background:transparent;color:var(--dim);border:1px solid transparent;padding:4px 10px;cursor:pointer;border-radius:3px;font-family:inherit;font-size:12px;transition:all .15s}
.tf-btn:hover{color:var(--text);border-color:var(--border)}
.tf-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.conn-status{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:var(--dim)}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--red)}
.status-dot.connected{background:var(--green)}

.chart-panel{position:relative;overflow:hidden}
#chart{width:100%;height:100%}

.right-panel{display:grid;grid-template-rows:1fr 1fr;border-left:1px solid var(--border);overflow:hidden}
.panel-section{display:flex;flex-direction:column;overflow:hidden}
.panel-header{padding:8px 12px;font-size:11px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-body{flex:1;overflow-y:auto;padding:0}

.ob-row{display:grid;grid-template-columns:1fr 80px 1fr;padding:2px 12px;font-size:12px;position:relative;line-height:20px}
.ob-row .price{text-align:center;font-weight:500}
.ob-row .qty{font-variant-numeric:tabular-nums}
.ob-row .qty.bid{text-align:right;color:var(--green)}
.ob-row .qty.ask{text-align:left;color:var(--red)}
.ob-bar{position:absolute;top:0;bottom:0;opacity:.12}
.ob-bar.bid-bar{right:50%;background:var(--green)}
.ob-bar.ask-bar{left:50%;background:var(--red)}
.ob-spread{text-align:center;padding:4px 12px;font-size:11px;color:var(--dim);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}

.trade-row{display:grid;grid-template-columns:1fr 1fr 1fr;padding:2px 12px;font-size:12px;line-height:20px;font-variant-numeric:tabular-nums}
.trade-row.buy .trade-price{color:var(--green)}
.trade-row.sell .trade-price{color:var(--red)}
.trade-row .trade-time{color:var(--dim);text-align:right}

.ticker-item{display:flex;align-items:center;gap:6px}
.ticker-label{color:var(--dim);font-size:11px}
.ticker-value{font-variant-numeric:tabular-nums}
.ticker-value.up{color:var(--green)}
.ticker-value.down{color:var(--red)}

/* Backtest panel */
.backtest-panel{display:none;padding:24px;overflow-y:auto}
.backtest-panel.active{display:block}
.bt-form{display:grid;grid-template-columns:120px 1fr;gap:8px 12px;max-width:500px;margin-bottom:24px}
.bt-form label{color:var(--dim);font-size:12px;padding:6px 0;text-align:right}
.bt-form select,.bt-form input{background:var(--bg);color:var(--text);border:1px solid var(--border);padding:6px 10px;border-radius:4px;font-family:inherit;font-size:12px}
.bt-form input:focus,.bt-form select:focus{outline:none;border-color:var(--accent)}
.bt-run-btn{background:var(--accent);color:#fff;border:none;padding:8px 24px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;margin:12px 0;transition:opacity .15s}
.bt-run-btn:hover{opacity:.85}
.bt-run-btn:disabled{opacity:.4;cursor:not-allowed}
.bt-progress{margin:12px 0;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
.bt-progress-bar{height:100%;background:var(--accent);transition:width .3s}
.bt-status{font-size:12px;color:var(--dim);margin:4px 0}
.bt-results{display:none;margin-top:24px}
.bt-results.active{display:block}
.bt-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.bt-stat-card{background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:12px 16px}
.bt-stat-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.bt-stat-value{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
.bt-stat-value.positive{color:var(--green)}
.bt-stat-value.negative{color:var(--red)}
.bt-equity-chart{height:200px;margin-bottom:24px;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.bt-trades-table{width:100%;border-collapse:collapse;font-size:12px}
.bt-trades-table th{text-align:left;padding:6px 12px;color:var(--dim);font-size:11px;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid var(--border)}
.bt-trades-table td{padding:6px 12px;border-bottom:1px solid var(--border);font-variant-numeric:tabular-nums}
.bt-trades-table .pnl-pos{color:var(--green)}
.bt-trades-table .pnl-neg{color:var(--red)}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#444}
</style>
</head>
<body>
<div class="app">
  <div class="top-bar">
    <span class="logo">TRADEFOX</span>
    <select class="symbol-select" id="symbolSelect">
      <option value="BTCUSDT">BTCUSDT</option>
      <option value="ETHUSDT">ETHUSDT</option>
      <option value="SOLUSDT">SOLUSDT</option>
      <option value="BNBUSDT">BNBUSDT</option>
      <option value="XRPUSDT">XRPUSDT</option>
    </select>
    <div class="tf-buttons" id="tfButtons">
      <button class="tf-btn active" data-tf="1m">1m</button>
      <button class="tf-btn" data-tf="5m">5m</button>
      <button class="tf-btn" data-tf="15m">15m</button>
      <button class="tf-btn" data-tf="1h">1h</button>
      <button class="tf-btn" data-tf="4h">4h</button>
      <button class="tf-btn" data-tf="1D">1D</button>
    </div>
    <div class="conn-status">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Disconnected</span>
    </div>
  </div>
  <div class="tab-bar">
    <button class="tab-btn active" data-tab="chart">Chart</button>
    <button class="tab-btn" data-tab="backtest">Backtest</button>
  </div>
  <div class="main" id="mainArea">
    <div class="chart-panel" id="chartPanel"><div id="chart"></div></div>
    <div class="right-panel" id="rightPanel">
      <div class="panel-section" style="border-bottom:1px solid var(--border)">
        <div class="panel-header">Order Book</div>
        <div class="panel-body" id="orderbook"></div>
      </div>
      <div class="panel-section">
        <div class="panel-header">Recent Trades</div>
        <div class="panel-body" id="trades"></div>
      </div>
    </div>
    <div class="backtest-panel" id="backtestPanel">
      <h2 style="margin-bottom:16px;font-size:16px;color:var(--text)">Backtest Runner</h2>
      <div class="bt-form">
        <label>Strategy</label>
        <select id="btStrategy">
          <option value="scalp_absorption">Scalp Absorption</option>
          <option value="day_fvg">Day Trade FVG</option>
          <option value="swing_liquidity">Swing Liquidity</option>
        </select>
        <label>Symbol</label>
        <input type="text" id="btSymbol" value="BTCUSDT">
        <label>From</label>
        <input type="date" id="btFrom" value="2024-01-01">
        <label>To</label>
        <input type="date" id="btTo" value="2024-12-31">
        <label>Capital (USDT)</label>
        <input type="number" id="btCapital" value="10000">
        <label>Risk %</label>
        <input type="number" id="btRisk" value="2.0" step="0.1">
      </div>
      <button class="bt-run-btn" id="btRunBtn">Run Backtest</button>
      <div class="bt-progress" id="btProgress" style="display:none">
        <div class="bt-progress-bar" id="btProgressBar" style="width:0%"></div>
      </div>
      <div class="bt-status" id="btStatus"></div>
      <div class="bt-results" id="btResults">
        <div class="bt-stats" id="btStats"></div>
        <div class="bt-equity-chart" id="btEquityChart"></div>
        <h3 style="margin-bottom:8px;font-size:13px;color:var(--dim)">TRADE LOG</h3>
        <table class="bt-trades-table">
          <thead><tr><th>#</th><th>Side</th><th>Entry</th><th>Exit</th><th>Qty</th><th>PnL</th><th>PnL%</th></tr></thead>
          <tbody id="btTradesBody"></tbody>
        </table>
      </div>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="ticker-item"><span class="ticker-label">Price</span><span class="ticker-value" id="tickPrice">--</span></div>
    <div class="ticker-item"><span class="ticker-label">24h Change</span><span class="ticker-value" id="tick24h">--</span></div>
    <div class="ticker-item"><span class="ticker-label">24h Volume</span><span class="ticker-value" id="tickVol">--</span></div>
    <div class="ticker-item"><span class="ticker-label">Funding</span><span class="ticker-value" id="tickFunding">--</span></div>
  </div>
</div>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<script>
(function(){
'use strict';

var currentSymbol = 'BTCUSDT';
var currentTF = '1m';
var currentTab = 'chart';
var ws = null;
var chart = null;
var candleSeries = null;
var volumeSeries = null;
var equityChart = null;
var equitySeries = null;
var MAX_TRADES = 100;
var recentTrades = [];
var tfToBinance = {'1m':'1m','5m':'5m','15m':'15m','1h':'1h','4h':'4h','1D':'1d'};

// Tab switching
document.querySelector('.tab-bar').addEventListener('click', function(e) {
  var btn = e.target.closest('.tab-btn');
  if (!btn) return;
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  currentTab = btn.dataset.tab;
  switchTab(currentTab);
});

function switchTab(tab) {
  var mainArea = document.getElementById('mainArea');
  var chartPanel = document.getElementById('chartPanel');
  var rightPanel = document.getElementById('rightPanel');
  var btPanel = document.getElementById('backtestPanel');
  if (tab === 'backtest') {
    mainArea.classList.add('backtest-mode');
    chartPanel.style.display = 'none';
    rightPanel.style.display = 'none';
    btPanel.classList.add('active');
  } else {
    mainArea.classList.remove('backtest-mode');
    chartPanel.style.display = '';
    rightPanel.style.display = '';
    btPanel.classList.remove('active');
    if (chart) chart.applyOptions({});
  }
}

function initChart() {
  var container = document.getElementById('chart');
  chart = LightweightCharts.createChart(container, {
    layout: {background:{type:'solid',color:'#0a0a0a'},textColor:'#888',fontSize:11},
    grid: {vertLines:{color:'#1a1a1a'},horzLines:{color:'#1a1a1a'}},
    crosshair: {mode: LightweightCharts.CrosshairMode.Normal},
    rightPriceScale: {borderColor:'#2a2a2a',scaleMargins:{top:0.1,bottom:0.2}},
    timeScale: {borderColor:'#2a2a2a',timeVisible:true,secondsVisible:false},
    handleScroll:{vertTouchDrag:false},
  });
  candleSeries = chart.addSeries(LightweightCharts.CandlestickSeries, {
    upColor:'#00c853',downColor:'#ff1744',
    borderUpColor:'#00c853',borderDownColor:'#ff1744',
    wickUpColor:'#00c853',wickDownColor:'#ff1744',
  });
  volumeSeries = chart.addSeries(LightweightCharts.HistogramSeries, {
    priceFormat:{type:'volume'}, priceScaleId:'vol',
  });
  chart.priceScale('vol').applyOptions({scaleMargins:{top:0.8,bottom:0}});
  new ResizeObserver(function(entries) {
    var r = entries[0].contentRect;
    chart.applyOptions({width: r.width, height: r.height});
  }).observe(container);
}

function fetchCandles(symbol, tf) {
  var interval = tfToBinance[tf] || '1m';
  fetch('/api/candles?symbol=' + encodeURIComponent(symbol) + '&timeframe=' + encodeURIComponent(interval) + '&limit=500')
    .then(function(resp) { return resp.ok ? resp.json() : Promise.reject('fetch failed'); })
    .then(function(data) {
      if (!Array.isArray(data)) return;
      var candles = data.map(function(c) { return {time:c.time, open:c.open, high:c.high, low:c.low, close:c.close}; });
      var volumes = data.map(function(c) {
        return {time:c.time, value:c.volume, color: c.close >= c.open ? 'rgba(0,200,83,0.3)' : 'rgba(255,23,68,0.3)'};
      });
      candleSeries.setData(candles);
      volumeSeries.setData(volumes);
      chart.timeScale().fitContent();
    })
    .catch(function(e) { console.error('fetchCandles:', e); });
}

function connectWS() {
  if (ws) { ws.close(); ws = null; }
  var proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws/chart?symbol=' + encodeURIComponent(currentSymbol));
  ws.onopen = function() {
    document.getElementById('statusDot').classList.add('connected');
    document.getElementById('statusText').textContent = 'Connected';
  };
  ws.onclose = function() {
    document.getElementById('statusDot').classList.remove('connected');
    document.getElementById('statusText').textContent = 'Disconnected';
    setTimeout(connectWS, 3000);
  };
  ws.onerror = function() {
    document.getElementById('statusDot').classList.remove('connected');
    document.getElementById('statusText').textContent = 'Error';
  };
  ws.onmessage = function(evt) {
    var lines = evt.data.split('\n');
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].trim();
      if (!line) continue;
      try { handleWSMessage(JSON.parse(line)); } catch(e) {}
    }
  };
}

function handleWSMessage(msg) {
  switch(msg.type) {
    case 'candle': handleCandle(msg); break;
    case 'trade': handleTrade(msg); break;
    case 'orderbook': handleOrderbook(msg); break;
    case 'ticker': handleTicker(msg); break;
  }
}

function handleCandle(msg) {
  if (msg.timeframe && msg.timeframe !== currentTF) return;
  var d = msg.data;
  if (!d) return;
  candleSeries.update({time:d.time, open:d.open, high:d.high, low:d.low, close:d.close});
  volumeSeries.update({time:d.time, value:d.volume, color: d.close >= d.open ? 'rgba(0,200,83,0.3)' : 'rgba(255,23,68,0.3)'});
}

function handleTrade(msg) {
  var d = msg.data;
  if (!d) return;
  recentTrades.unshift(d);
  if (recentTrades.length > MAX_TRADES) recentTrades.length = MAX_TRADES;
  renderTrades();
}

function renderTrades() {
  var el = document.getElementById('trades');
  while (el.firstChild) el.removeChild(el.firstChild);
  var count = Math.min(recentTrades.length, 50);
  for (var i = 0; i < count; i++) {
    var t = recentTrades[i];
    var row = document.createElement('div');
    row.className = 'trade-row ' + (t.side === 'buy' ? 'buy' : 'sell');
    var priceSpan = document.createElement('span');
    priceSpan.className = 'trade-price';
    priceSpan.textContent = fmtPrice(t.price);
    var sizeSpan = document.createElement('span');
    sizeSpan.textContent = fmtQty(t.size);
    var timeSpan = document.createElement('span');
    timeSpan.className = 'trade-time';
    timeSpan.textContent = new Date(t.time).toLocaleTimeString();
    row.appendChild(priceSpan);
    row.appendChild(sizeSpan);
    row.appendChild(timeSpan);
    el.appendChild(row);
  }
}

function handleOrderbook(msg) {
  var d = msg.data;
  if (!d) return;
  renderOrderbook(d.bids || [], d.asks || []);
}

function renderOrderbook(bids, asks) {
  var el = document.getElementById('orderbook');
  while (el.firstChild) el.removeChild(el.firstChild);
  var depth = 15;
  var topAsks = asks.slice(0, depth).reverse();
  var topBids = bids.slice(0, depth);
  var maxQty = 0.001;
  for (var i = 0; i < topAsks.length; i++) { if (topAsks[i][1] > maxQty) maxQty = topAsks[i][1]; }
  for (var i = 0; i < topBids.length; i++) { if (topBids[i][1] > maxQty) maxQty = topBids[i][1]; }

  for (var i = 0; i < topAsks.length; i++) {
    el.appendChild(createOBRow(topAsks[i], 'ask', maxQty));
  }
  if (topAsks.length && topBids.length) {
    var spreadDiv = document.createElement('div');
    spreadDiv.className = 'ob-spread';
    spreadDiv.textContent = 'Spread: ' + (topAsks[topAsks.length-1][0] - topBids[0][0]).toFixed(2);
    el.appendChild(spreadDiv);
  }
  for (var i = 0; i < topBids.length; i++) {
    el.appendChild(createOBRow(topBids[i], 'bid', maxQty));
  }
}

function createOBRow(level, side, maxQty) {
  var row = document.createElement('div');
  row.className = 'ob-row';
  var bar = document.createElement('span');
  bar.className = 'ob-bar ' + (side === 'bid' ? 'bid-bar' : 'ask-bar');
  bar.style.width = ((level[1] / maxQty) * 100).toFixed(1) + '%';
  row.appendChild(bar);

  var qty1 = document.createElement('span');
  var priceSpan = document.createElement('span');
  var qty2 = document.createElement('span');

  priceSpan.className = 'price';
  priceSpan.style.color = side === 'bid' ? 'var(--green)' : 'var(--red)';
  priceSpan.textContent = fmtPrice(level[0]);

  if (side === 'ask') {
    qty1.className = 'qty ask';
    qty1.textContent = fmtQty(level[1]);
    qty2.textContent = '';
  } else {
    qty1.textContent = '';
    qty2.className = 'qty bid';
    qty2.textContent = fmtQty(level[1]);
  }
  row.appendChild(qty1);
  row.appendChild(priceSpan);
  row.appendChild(qty2);
  return row;
}

function handleTicker(msg) {
  var d = msg.data;
  if (!d) return;
  document.getElementById('tickPrice').textContent = fmtPrice(d.price);
  if (d.change24h !== undefined) {
    var el = document.getElementById('tick24h');
    var pct = (d.change24h * 100).toFixed(2);
    el.textContent = (d.change24h >= 0 ? '+' : '') + pct + '%';
    el.className = 'ticker-value ' + (d.change24h >= 0 ? 'up' : 'down');
  }
  if (d.volume24h !== undefined) {
    document.getElementById('tickVol').textContent = fmtVolume(d.volume24h);
  }
  if (d.funding !== undefined) {
    var fel = document.getElementById('tickFunding');
    fel.textContent = (d.funding * 100).toFixed(4) + '%';
    fel.className = 'ticker-value ' + (d.funding >= 0 ? 'up' : 'down');
  }
}

function fmtPrice(v) {
  if (v == null) return '--';
  var n = Number(v);
  if (n >= 1000) return n.toFixed(2);
  if (n >= 1) return n.toFixed(4);
  return n.toFixed(6);
}
function fmtQty(v) {
  if (v == null) return '--';
  var n = Number(v);
  if (n >= 1000) return n.toFixed(2);
  if (n >= 1) return n.toFixed(4);
  return n.toFixed(6);
}
function fmtVolume(v) {
  if (v == null) return '--';
  if (v >= 1e9) return (v/1e9).toFixed(2) + 'B';
  if (v >= 1e6) return (v/1e6).toFixed(2) + 'M';
  if (v >= 1e3) return (v/1e3).toFixed(2) + 'K';
  return v.toFixed(2);
}

// --- Backtest Panel ---
document.getElementById('btRunBtn').addEventListener('click', runBacktest);

function runBacktest() {
  var btn = document.getElementById('btRunBtn');
  btn.disabled = true;
  btn.textContent = 'Running...';
  document.getElementById('btProgress').style.display = 'block';
  document.getElementById('btProgressBar').style.width = '10%';
  document.getElementById('btStatus').textContent = 'Connecting to Nautilus...';
  document.getElementById('btResults').classList.remove('active');

  var payload = {
    strategy: document.getElementById('btStrategy').value,
    symbols: [document.getElementById('btSymbol').value],
    venue: 'BINANCE',
    data_type: '1m',
    strategy_params: {
      starting_balance: document.getElementById('btCapital').value,
      risk_per_trade_pct: (parseFloat(document.getElementById('btRisk').value) / 100).toString()
    }
  };

  document.getElementById('btProgressBar').style.width = '30%';
  document.getElementById('btStatus').textContent = 'Running backtest...';

  fetch('/api/backtest/run', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  })
  .then(function(resp) { return resp.json(); })
  .then(function(data) {
    document.getElementById('btProgressBar').style.width = '100%';
    btn.disabled = false;
    btn.textContent = 'Run Backtest';

    if (data.error) {
      document.getElementById('btStatus').textContent = 'Error: ' + (data.error || data.error_msg);
      return;
    }
    if (data.status === 'error') {
      document.getElementById('btStatus').textContent = 'Error: ' + (data.error_msg || 'unknown');
      return;
    }

    document.getElementById('btStatus').textContent = 'Complete - ' + (data.total_trades || 0) + ' trades';
    renderBacktestResults(data);
  })
  .catch(function(err) {
    document.getElementById('btStatus').textContent = 'Error: ' + err;
    btn.disabled = false;
    btn.textContent = 'Run Backtest';
  });
}

function renderBacktestResults(data) {
  var results = document.getElementById('btResults');
  results.classList.add('active');

  // Stats cards
  var stats = document.getElementById('btStats');
  while (stats.firstChild) stats.removeChild(stats.firstChild);
  var cards = [
    {label:'Total Return', value:(data.total_return * 100).toFixed(2) + '%', pos: data.total_return >= 0},
    {label:'Sharpe Ratio', value:data.sharpe_ratio.toFixed(2), pos: data.sharpe_ratio >= 0},
    {label:'Max Drawdown', value:(data.max_drawdown * 100).toFixed(2) + '%', pos: false},
    {label:'Win Rate', value:(data.win_rate * 100).toFixed(1) + '%', pos: data.win_rate >= 0.5},
    {label:'Profit Factor', value:data.profit_factor.toFixed(2), pos: data.profit_factor >= 1},
    {label:'Total Trades', value:String(data.total_trades), pos: true}
  ];
  cards.forEach(function(c) {
    var card = document.createElement('div');
    card.className = 'bt-stat-card';
    var lbl = document.createElement('div');
    lbl.className = 'bt-stat-label';
    lbl.textContent = c.label;
    var val = document.createElement('div');
    val.className = 'bt-stat-value ' + (c.pos ? 'positive' : 'negative');
    val.textContent = c.value;
    card.appendChild(lbl);
    card.appendChild(val);
    stats.appendChild(card);
  });

  // Equity curve chart
  var eqContainer = document.getElementById('btEquityChart');
  while (eqContainer.firstChild) eqContainer.removeChild(eqContainer.firstChild);
  if (data.equity_curve && data.equity_curve.length > 0) {
    equityChart = LightweightCharts.createChart(eqContainer, {
      layout: {background:{type:'solid',color:'#1a1a1a'},textColor:'#888',fontSize:10},
      grid: {vertLines:{color:'#2a2a2a'},horzLines:{color:'#2a2a2a'}},
      rightPriceScale: {borderColor:'#2a2a2a'},
      timeScale: {borderColor:'#2a2a2a',visible:false},
      handleScroll:false,handleScale:false,
    });
    equitySeries = equityChart.addSeries(LightweightCharts.LineSeries, {
      color:'#2196f3',lineWidth:2,
    });
    var eqData = data.equity_curve.map(function(p, i) {
      return {time: i, value: p.equity};
    });
    equitySeries.setData(eqData);
    equityChart.timeScale().fitContent();
    new ResizeObserver(function(entries) {
      var r = entries[0].contentRect;
      equityChart.applyOptions({width: r.width, height: r.height});
    }).observe(eqContainer);
  }

  // Trade log
  var tbody = document.getElementById('btTradesBody');
  while (tbody.firstChild) tbody.removeChild(tbody.firstChild);
  if (data.trades) {
    data.trades.forEach(function(t, i) {
      var row = document.createElement('tr');
      var pnlClass = t.pnl >= 0 ? 'pnl-pos' : 'pnl-neg';
      var cells = [
        String(i + 1),
        t.side,
        fmtPrice(t.entry_price),
        fmtPrice(t.exit_price),
        fmtQty(t.quantity),
        t.pnl.toFixed(2),
        t.pnl_pct.toFixed(2) + '%'
      ];
      cells.forEach(function(text, ci) {
        var td = document.createElement('td');
        td.textContent = text;
        if (ci >= 5) td.className = pnlClass;
        row.appendChild(td);
      });
      tbody.appendChild(row);
    });
  }
}

document.getElementById('tfButtons').addEventListener('click', function(e) {
  var btn = e.target.closest('.tf-btn');
  if (!btn) return;
  document.querySelectorAll('.tf-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  currentTF = btn.dataset.tf;
  fetchCandles(currentSymbol, currentTF);
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({type:'subscribe', timeframe: currentTF}));
  }
});

document.getElementById('symbolSelect').addEventListener('change', function(e) {
  currentSymbol = e.target.value;
  recentTrades.length = 0;
  renderTrades();
  var ob = document.getElementById('orderbook');
  while (ob.firstChild) ob.removeChild(ob.firstChild);
  fetchCandles(currentSymbol, currentTF);
  connectWS();
});

initChart();
fetchCandles(currentSymbol, currentTF);
connectWS();
})();
</script>
</body>
